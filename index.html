<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Living Globe</title>
    <script type="module" crossorigin src="/globe-pretext/assets/index-Dy9SmQmd.js"></script>
    <link rel="stylesheet" crossorigin href="/globe-pretext/assets/index-DwcU25lO.css">
  </head>
  <body>
    <!-- Dashboard UI -->
    <div id="dashboard-panel" style="position: absolute; left: 20px; top: 20px; width: 280px; background: rgba(10, 15, 30, 0.85); backdrop-filter: blur(10px); color: white; border: 1px solid rgba(0,255,255,0.2); border-radius: 12px; padding: 20px; font-family: Inter, sans-serif; box-shadow: 0 4px 20px rgba(0,0,0,0.5); z-index: 10;">
      <h2 style="margin: 0 0 15px 0; font-size: 16px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #00ffff; border-bottom: 1px solid rgba(0,255,255,0.2); padding-bottom: 10px;">Data Layers</h2>
      
      <div style="display: flex; flex-direction: column; gap: 12px;">
        <label style="display: flex; align-items: center; cursor: pointer; font-size: 14px; transition: color 0.2s;" onmouseover="this.style.color='#00ffff'" onmouseout="this.style.color='white'">
          <input type="checkbox" id="layer-pretext" style="margin-right: 10px; width: 16px; height: 16px; accent-color: #00ffff; cursor: pointer;">
          Matrix Pretext Mode
        </label>
        
        <label style="display: flex; align-items: center; cursor: pointer; font-size: 14px; transition: color 0.2s;" onmouseover="this.style.color='#00ffff'" onmouseout="this.style.color='white'">
          <input type="checkbox" id="layer-3d-spikes" style="margin-right: 10px; width: 16px; height: 16px; accent-color: #00ffff; cursor: pointer;">
          3D Population Spikes
        </label>
        
        <label style="display: flex; align-items: center; cursor: pointer; font-size: 14px; transition: color 0.2s;" onmouseover="this.style.color='#00ffff'" onmouseout="this.style.color='white'">
          <input type="checkbox" id="layer-networks" style="margin-right: 10px; width: 16px; height: 16px; accent-color: #00ffff; cursor: pointer;" checked>
          Network Arcs & Beams
        </label>

        <label style="display: flex; align-items: center; cursor: pointer; font-size: 14px; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); transition: color 0.2s;" onmouseover="this.style.color='#ff4444'" onmouseout="this.style.color='white'">
          <input type="checkbox" id="layer-pause" style="margin-right: 10px; width: 16px; height: 16px; accent-color: #ff4444; cursor: pointer;">
          Pause Real-time Data
        </label>

        <div style="margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1);">
          <label style="display: block; font-size: 12px; margin-bottom: 5px; color: #aaa;">Fly To City</label>
          <select id="fly-to-select" style="width: 100%; padding: 8px; background: rgba(0,0,0,0.5); color: #00ffff; border: 1px solid #00ffff; border-radius: 4px; outline: none; font-family: Inter, sans-serif; cursor: pointer;">
            <option value="">Select a city...</option>
            <option value="37.5665,126.9780">Seoul, South Korea</option>
            <option value="40.7128,-74.0060">New York, USA</option>
            <option value="35.6895,139.6917">Tokyo, Japan</option>
            <option value="48.8566,2.3522">Paris, France</option>
            <option value="51.5074,-0.1278">London, UK</option>
            <option value="39.9042,116.4074">Beijing, China</option>
          </select>
        </div>

        <!-- NEW GOAL MODE TOGGLES -->
        <div style="margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1);">
          <label style="display: flex; align-items: center; cursor: pointer; font-size: 14px; transition: color 0.2s; color: #ff00ff; margin-top: 10px;" onmouseover="this.style.color='#ffaaff'" onmouseout="this.style.color='#ff00ff'">
            <input type="checkbox" id="layer-unroll" style="margin-right: 10px; width: 16px; height: 16px; accent-color: #ff00ff; cursor: pointer;">
            🗺️ Unroll to 2D Map
          </label>
          <label style="display: flex; align-items: center; cursor: pointer; font-size: 14px; transition: color 0.2s; color: #00ffff; margin-top: 10px;" onmouseover="this.style.color='#aaffff'" onmouseout="this.style.color='#00ffff'">
            <input type="checkbox" id="layer-satellites" style="margin-right: 10px; width: 16px; height: 16px; accent-color: #00ffff; cursor: pointer;" checked>
            🛰️ Space Satellites
          </label>
        </div>
      </div>
    </div>

<!-- Crosshair removed -->
      <!-- Three.js Canvas container -->
      <div id="globe-container"></div>
      <!-- 2D Canvas Overlay for Pretext -->
      <canvas id="text-overlay"></canvas>
      <!-- UI Overlay -->
      <div id="ui-layer">
        <div id="info-panel" style="display: none; position: absolute; right: 20px; top: 20px; width: 320px; background: rgba(10, 15, 30, 0.85); backdrop-filter: blur(10px); color: white; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; font-family: Inter, sans-serif; box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 1000; transition: opacity 0.3s ease;">
          <button id="info-close" style="position: absolute; top: 15px; right: 15px; background: none; border: none; color: #888; cursor: pointer; font-size: 18px;">✕</button>
          <h2 id="info-title" style="margin: 0 0 5px 0; font-size: 24px; color: #00ffff; font-weight: 600;">Title</h2>
          <p id="info-subtitle" style="margin: 0 0 15px 0; font-size: 13px; color: #aaa;"></p>
          <div id="info-desc" style="font-size: 14px; line-height: 1.6; color: #ddd; white-space: pre-wrap;"></div>
        </div>

        <!-- Help & Legend Panel -->
        <div id="legend-panel" style="position: absolute; left: 20px; bottom: 20px; width: 290px; background: rgba(10, 15, 30, 0.9); backdrop-filter: blur(10px); color: white; border: 1px solid rgba(0,255,255,0.25); border-radius: 12px; padding: 15px; font-family: Inter, sans-serif; box-shadow: 0 4px 20px rgba(0,0,0,0.6); z-index: 1000; transition: all 0.3s ease;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid rgba(0,255,255,0.2); padding-bottom: 5px;">
            <span style="font-size: 13px; font-weight: bold; color: #00ffff; letter-spacing: 0.5px;">💡 사용법 & 범례 (Help & Legend)</span>
            <button id="legend-close" style="background: none; border: none; color: #888; cursor: pointer; font-size: 14px; line-height: 1;">✕</button>
          </div>
          <div style="font-size: 11px; line-height: 1.5; display: flex; flex-direction: column; gap: 8px;">
            <div>
              <strong style="color: #ffaa00; font-size: 12px;">🎮 조작 방법 (Controls)</strong>
              <div style="margin-top: 3px; color: #ccc;">
                • 회전: 마우스 드래그 (Drag)<br>
                • 확대/축소: 마우스 휠 (Scroll)<br>
                • 선택: 도시/위성/네트워크 선 클릭 (Click)
              </div>
            </div>
            <div>
              <strong style="color: #ffaa00; font-size: 12px;">📊 인구수별 색상 (Population Legend)</strong>
              <div style="margin-top: 4px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px;">
                <div style="display: flex; align-items: center; gap: 4px;"><span style="display:inline-block; width:8px; height:8px; border-radius:50%; background:#ff00ff;"></span> 2,000만+</div>
                <div style="display: flex; align-items: center; gap: 4px;"><span style="display:inline-block; width:8px; height:8px; border-radius:50%; background:#ff3300;"></span> 1,000만~2,000만</div>
                <div style="display: flex; align-items: center; gap: 4px;"><span style="display:inline-block; width:8px; height:8px; border-radius:50%; background:#ffcc00;"></span> 500만~1,000만</div>
                <div style="display: flex; align-items: center; gap: 4px;"><span style="display:inline-block; width:8px; height:8px; border-radius:50%; background:#33ff33;"></span> 200만~500만</div>
                <div style="display: flex; align-items: center; gap: 4px;"><span style="display:inline-block; width:8px; height:8px; border-radius:50%; background:#00ffff;"></span> 100만~200만</div>
                <div style="display: flex; align-items: center; gap: 4px;"><span style="display:inline-block; width:8px; height:8px; border-radius:50%; background:#888888;"></span> 100만 이하</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Help Toggle Button -->
        <button id="legend-toggle" style="position: absolute; left: 20px; bottom: 20px; width: 36px; height: 36px; border-radius: 50%; background: rgba(10, 15, 30, 0.85); color: #00ffff; border: 1px solid rgba(0,255,255,0.4); font-size: 16px; font-weight: bold; cursor: pointer; display: none; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 999; transition: all 0.2s;" onmouseover="this.style.background='#00ffff'; this.style.color='#0a0f1e'" onmouseout="this.style.background='rgba(10, 15, 30, 0.85)'; this.style.color='#00ffff'">?</button>
      </div>
    </div>
  </body>
</html>
