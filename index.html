<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Living Globe</title>
    <link rel="stylesheet" href="/src/styles/global.css" />
  </head>
  <body>
    <div id="app">
      <button id="toggle-update" style="position: absolute; top: 20px; left: 20px; z-index: 1000; background: rgba(0,0,0,0.7); color: white; border: 1px solid #555; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-family: Inter, sans-serif;">
        Pause Updates
      </button>
      <button id="toggle-pretext-mode" style="position: absolute; top: 70px; left: 20px; z-index: 1000; background: rgba(0,20,0,0.8); color: #0f0; border: 1px solid #0f0; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-family: monospace; font-weight: bold; box-shadow: 0 0 10px rgba(0,255,0,0.2);">
        MATRIX PRETEXT MODE
      </button>
      <!-- Three.js Canvas container -->
      <div id="globe-container"></div>
      <!-- 2D Canvas Overlay for Pretext -->
      <canvas id="text-overlay"></canvas>
      <!-- UI Overlay -->
      <div id="ui-layer">
        <div id="info-panel" style="display: none; position: absolute; right: 20px; top: 20px; width: 320px; background: rgba(10, 15, 30, 0.85); backdrop-filter: blur(10px); color: white; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; font-family: Inter, sans-serif; box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 1000; transition: opacity 0.3s ease;">
          <button id="info-close" style="position: absolute; top: 15px; right: 15px; background: none; border: none; color: #888; cursor: pointer; font-size: 18px;">✕</button>
          <h2 id="info-title" style="margin: 0 0 5px 0; font-size: 24px; color: #00ffff; font-weight: 600;">Title</h2>
          <p id="info-subtitle" style="margin: 0 0 15px 0; font-size: 13px; color: #aaa;"></p>
          <div id="info-desc" style="font-size: 14px; line-height: 1.6; color: #ddd; white-space: pre-wrap;"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
